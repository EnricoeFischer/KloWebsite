<!DOCTYPE html>
<html>

<head>
    <title>Rate your Dixi</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        img {
            width: 90%;
            max-width: 600px;
            height: auto;
        }

        .rating input {
            display: none;
        }

        .rating label {
            display: inline-block;
            padding: 12px 20px;
            margin: 5px;
            background-color: #444;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        .rating input:checked + label {
            background-color: #00cc66;
            color: black;
        }

        #submitBtn {
            display: block;
            margin: 30px auto;
            padding: 12px 20px;
            background-color: #444;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        #submitBtn:hover {
            background-color: #666;
        }

        #messageBox {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);

            padding: 12px;
            border-radius: 8px;
            color: white;
            display: none;
            font-weight: bold;
        }

        .success {
            background-color: #00cc66;
            color: black;
        }

        .error {
            background-color: #ff4444;
        }

        .warning {
            background-color: #ffcc00;
            color: black;
        }

    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>


<body>


    <h1>Rate your Dixi</h1>

    <h2 id="dixiTitle"></h2>


    <!-- Nur für Entwickler sichtbar -->
    <div id="testSelector" style="display:none">

        <h2>Dixi auswählen (Testmodus)</h2>

        <select id="dixiSelect">

            <option value="1">Dixi 1</option>
            <option value="2">Dixi 2</option>
            <option value="3">Dixi 3</option>
            <option value="4">Dixi 4</option>
            <option value="5">Dixi 5</option>
            <option value="6">Dixi 6</option>
            <option value="7">Dixi 7</option>
            <option value="8">Dixi 8</option>
            <option value="9">Dixi 9</option>
            <option value="10">Dixi 10</option>

        </select>

    </div>



    <img src="Bilder/5dixies.jpg" alt="Dixies">



    <h2>Hygiene</h2>

    <div class="rating">

        <input type="radio" id="h1" name="hygiene" value="1">
        <label for="h1">1</label>

        <input type="radio" id="h2" name="hygiene" value="2">
        <label for="h2">2</label>

        <input type="radio" id="h3" name="hygiene" value="3">
        <label for="h3">3</label>

        <input type="radio" id="h4" name="hygiene" value="4">
        <label for="h4">4</label>

        <input type="radio" id="h5" name="hygiene" value="5">
        <label for="h5">5</label>

    </div>



    <h2>Geruch</h2>

    <div class="rating">

        <input type="radio" id="g1" name="geruch" value="1">
        <label for="g1">1</label>

        <input type="radio" id="g2" name="geruch" value="2">
        <label for="g2">2</label>

        <input type="radio" id="g3" name="geruch" value="3">
        <label for="g3">3</label>

        <input type="radio" id="g4" name="geruch" value="4">
        <label for="g4">4</label>

        <input type="radio" id="g5" name="geruch" value="5">
        <label for="g5">5</label>

    </div>



    <h2>Ausstattung</h2>

    <div class="rating">

        <input type="radio" id="a1" name="ausstattung" value="1">
        <label for="a1">1</label>

        <input type="radio" id="a2" name="ausstattung" value="2">
        <label for="a2">2</label>

        <input type="radio" id="a3" name="ausstattung" value="3">
        <label for="a3">3</label>

        <input type="radio" id="a4" name="ausstattung" value="4">
        <label for="a4">4</label>

        <input type="radio" id="a5" name="ausstattung" value="5">
        <label for="a5">5</label>

    </div>



    <button id="submitBtn">
        Bewertung absenden
    </button>


    <div id="messageBox"></div>



<script>


const supabaseUrl =
"https://jagyzxwkkxkkuqvmokwq.supabase.co";


const supabaseKey ="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImphZ3l6eHdra3hra3Vxdm1va3dxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNjE4MjIsImV4cCI6MjA5NzYzNzgyMn0.A1ImPgv9Cif4tTu8IxhNpdn3xN7lQW1fbh0_gPAN9lY";;


const { createClient } = supabase;


const client = createClient(
    supabaseUrl,
    supabaseKey
);



const params =
new URLSearchParams(
    window.location.search
);



let dixiId =
params.get("dixi");



const dixiSelect =
document.getElementById("dixiSelect");


const testSelector =
document.getElementById("testSelector");


const dixiTitle =
document.getElementById("dixiTitle");




// Entwickler-Testmodus

if (params.get("test") === "true") {

    testSelector.style.display = "block";

    dixiId = dixiSelect.value;

}



// QR-Code Modus

else {

    if (!dixiId) {

        dixiId = 1;

    }

}



// Sicherheit

if (dixiId < 1 || dixiId > 10) {

    dixiId = 1;

}



// Anzeige

dixiTitle.innerText =
"Dixi " + dixiId;



// Testmodus Dropdown

dixiSelect.addEventListener(
    "change",
    function(){

        dixiId = this.value;

        dixiTitle.innerText =
        "Dixi " + dixiId;

    }
);





document
.getElementById("submitBtn")
.addEventListener(
"click",
async () => {


    const hygiene =
    document.querySelector(
        'input[name="hygiene"]:checked'
    );


    const geruch =
    document.querySelector(
        'input[name="geruch"]:checked'
    );


    const ausstattung =
    document.querySelector(
        'input[name="ausstattung"]:checked'
    );



    if (!hygiene || !geruch || !ausstattung) {

        showMessage(
            "Bitte alle Kategorien bewerten!!!",
            "warning"
        );

        return;

    }



    const { error } =
    await client
    .from("ratings")
    .insert([{

        dixi_id: Number(dixiId),

        hygiene: Number(hygiene.value),

        geruch: Number(geruch.value),

        ausstattung: Number(ausstattung.value)

    }]);




    if (error) {

        console.log(error);

        showMessage(
            "Fehler beim Speichern!",
            "error"
        );

    }


    else {


        showMessage(
            "Danke für deine Bewertung!!",
            "success"
        );


        setTimeout(
            () => {

                window.location.href =
                "stats.html?dixi=" + dixiId;

            },
            500
        );

    }



});





function showMessage(
    text,
    type
) {


    const box =
    document.getElementById(
        "messageBox"
    );


    box.innerText =
    text;


    box.className =
    "";


    box.classList.add(
        type
    );


    box.style.display =
    "block";



    setTimeout(
        () => {

            box.style.display =
            "none";

        },
        2500
    );


}


</script>


</body>

</html>
