<!DOCTYPE html>
<html>

<head>

    <title>Rate your Dixi</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <style>
        body {

            background: black;
            color: white;

            font-family: Arial, sans-serif;

            text-align: center;

            padding: 40px;

        }


        h1 {

            margin-top: 50px;

        }


        button {

            display: block;

            width: 80%;

            max-width: 300px;

            margin: 30px auto;

            padding: 15px;

            font-size: 18px;

            border: none;

            border-radius: 10px;

            cursor: pointer;

        }


        #rateBtn {

            background: #00cc66;

            color: black;

        }


        #infoBtn {

            background: #cccc00;

            color: black;

        }
    </style>


</head>


<body>


    <h1>Rate your Dixi</h1>

    <h2>Was möchtest du machen?</h2>



    <button id="rateBtn">
        Dixi bewerten
    </button>


    <button id="infoBtn">
        Dixi Ranking ansehen
    </button>



    <script>


        const params =
            new URLSearchParams(
                window.location.search
            );


        const dixiId =
            params.get("dixi");



        document
            .getElementById("rateBtn")
            .addEventListener(
                "click",
                function () {


                    if (dixiId) {

                        window.location.href =
                            "index.html?dixi=" + dixiId;

                    }

                    else {

                        window.location.href =
                            "index.html";

                    }


                });





        document
            .getElementById("infoBtn")
            .addEventListener(
                "click",
                function () {


                    window.location.href =
                        "ranking.html";


                });


    </script>


</body>

</html>
