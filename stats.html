async function loadStats() {

        const { data, error } = await client

        .select("*")
        .single();

        console.log(data);
        console.log(error);

    if (error) {
        console.error(error);
        return;
    }
        if (!data) {
            document.getElementById("avgHygiene").textContent = "0.0";
            document.getElementById("avgGeruch").textContent = "0.0";
            document.getElementById("avgAusstattung").textContent = "0.0";
            document.getElementById("count").textContent = "0";
            return;
            }
        document.getElementById("avgHygiene").textContent =
            data.hygiene_avg.toFixed(1);

        document.getElementById("avgGeruch").textContent =
            data.geruch_avg.toFixed(1);

        document.getElementById("avgAusstattung").textContent =
            data.ausstattung_avg.toFixed(1);

        document.getElementById("count").textContent =
            data.total_ratings;


}
