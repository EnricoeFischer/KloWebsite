<!DOCTYPE html>
<html>

<head>
    <title>Dixi Stats</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-bottom: 3vh;
            font-size: clamp(22px, 4vw, 34px);
        }

        .stat {
            margin: 6vh auto;
            max-width: 600px;
            width: 90%;
        }

        .label {
            font-size: clamp(16px, 2.2vw, 20px);
            font-weight: bold;
            margin-bottom: 1rem;
            cursor: pointer;
        }

        .valueRow {
            margin-bottom: 0.6rem;
        }

        .value {
            font-size: clamp(14px, 2vw, 18px);
            padding: 0.25em 0.7em;
            border: 1px solid white;
            border-radius: 6px;
            display: inline-block;
        }

        .bar {
            position: relative;
            height: 1.2rem;
            border-radius: 999px;
            background: linear-gradient(to right, red, orange, yellow, green);
        }

        .barMarker {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 0.8rem;
            transform: translateX(-50%);
            border: 2px solid black;
            border-radius: 4px;
            background: transparent;
        }

        .scale {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-top: 0.4rem;
            opacity: 0.7;
        }

        .chartContainer {
            display: none;
            margin-top: 15px;
            height: 250px;
        }

        .chartContainer.open {
            display: block;
        }
    </style>
</head>

<body>

    <h1>Dixi Bewertungen</h1>
    <h2 id="dixiTitle"></h2>
    <!-- HYGIENE -->
    <div class="stat">
        <div class="label" onclick="toggleChart('hygieneChart')">Hygiene</div>

        <div class="chartContainer" id="hygieneChart">
            <canvas id="canvasHygiene"></canvas>
        </div>

        <div class="valueRow">
            <span class="value" id="valHygiene">0.0</span>
        </div>

        <div class="bar">
            <div class="barMarker" id="barMarkerHygiene"></div>
        </div>

        <div class="scale">
            <span>1</span>
            <span>5</span>
        </div>
    </div>

    <!-- GERUCH -->
    <div class="stat">
        <div class="label" onclick="toggleChart('geruchChart')">Geruch</div>

        <div class="chartContainer" id="geruchChart">
            <canvas id="canvasGeruch"></canvas>
        </div>

        <div class="valueRow">
            <span class="value" id="valGeruch">0.0</span>
        </div>

        <div class="bar">
            <div class="barMarker" id="barMarkerGeruch"></div>
        </div>

        <div class="scale">
            <span>1</span>
            <span>5</span>
        </div>
    </div>

    <!-- AUSSTATTUNG -->
    <div class="stat">
        <div class="label" onclick="toggleChart('ausstattungChart')">Ausstattung</div>

        <div class="chartContainer" id="ausstattungChart">
            <canvas id="canvasAusstattung"></canvas>
        </div>

        <div class="valueRow">
            <span class="value" id="valAusstattung">0.0</span>
        </div>

        <div class="bar">
            <div class="barMarker" id="barMarkerAusstattung"></div>
        </div>

        <div class="scale">
            <span>1</span>
            <span>5</span>
        </div>
    </div>
    <button id="rankingBtn">
    Alle Dixies vergleichen
</button>
    <script>
        document.getElementById("rankingBtn").addEventListener("click", () => {
            window.location.href = "ranking.html";
        });
    </script>
<script>
    // 🔴 HIER EINTRAGEN
    const supabaseUrl = "https://jagyzxwkkxkkuqvmokwq.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImphZ3l6eHdra3hra3Vxdm1va3dxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNjE4MjIsImV4cCI6MjA5NzYzNzgyMn0.A1ImPgv9Cif4tTu8IxhNpdn3xN7lQW1fbh0_gPAN9lY";

const { createClient } = supabase;

const client = createClient(
    supabaseUrl,
    supabaseKey
);


// ===============================
// Dixi ID aus URL lesen
// Beispiel:
// stats.html?dixi=5
// ===============================

const params = new URLSearchParams(
    window.location.search
);

const dixiId = Number(
    params.get("dixi")
) || 1;


// ===============================
// Start
// ===============================

loadStats();

loadHistogram();


// ===============================
// Durchschnittswerte laden
// ===============================

async function loadStats() {


    const { data, error } = await client
        .from("rating_stats_by_dixi")
        .select("*")
        .eq("id", dixiId)
        .single();



    console.log(
        "Stats:",
        data,
        error
    );


    if(error || !data){

        console.error(error);

        return;
    }



    document.getElementById(
        "dixiTitle"
    ).innerText =
        data.name + " Bewertungen";



    setBar(
        "valHygiene",
        "barMarkerHygiene",
        data.hygiene_avg
    );


    setBar(
        "valGeruch",
        "barMarkerGeruch",
        data.geruch_avg
    );


    setBar(
        "valAusstattung",
        "barMarkerAusstattung",
        data.ausstattung_avg
    );

}



// ===============================
// Histogramm laden
// ===============================

async function loadHistogram(){


    const { data, error } = await client
        .from("rating_histogram_by_dixi")
        .select("*")
        .eq(
            "dixi_id",
            dixiId
        );



    console.log(
        "Histogram:",
        data,
        error
    );



    if(error){

        console.error(error);

        return;
    }



    drawCharts(data);

}



// ===============================
// Charts erzeugen
// ===============================

function drawCharts(data){


    drawChart(
        "canvasHygiene",
        data,
        "hygiene"
    );


    drawChart(
        "canvasGeruch",
        data,
        "geruch"
    );


    drawChart(
        "canvasAusstattung",
        data,
        "ausstattung"
    );
}

function drawChart(
    canvasId,
    data,
    category
){
    const filtered = data
        .filter(
            x =>
            x.category === category
        )
        .sort(
            (a,b)=>
            a.rating-b.rating
        );

    new Chart(
        document.getElementById(canvasId),
        {
        type:"bar",
        data:{
            labels:
            filtered.map(
                x=>x.rating
            ),
            datasets:[{
                label:
                "Anzahl Bewertungen",
                data:
                filtered.map(
                    x=>x.amount
                ),
                backgroundColor:
                "rgba(0,200,255,0.6)",
                borderColor:
                "rgba(0,200,255,1)",
                borderWidth:1,
                borderRadius:6
            }]
        },
        options:{
            responsive:true,
            maintainAspectRatio:false,
            plugins:{
                legend:{
                    labels:{
                        color:"white"
                    }
                }
            },
            scales:{
                x:{
                    ticks:{


                        color:"white"

                    },


                    title:{


                        display:true,


                        text:
                        "Bewertung (1 = schlecht, 5 = gut)",
                        color:"white"
                    },
                    grid:{
                        color:
                        "rgba(255,255,255,0.1)"
                    }
                },
                y:{
                    beginAtZero:true,
                    ticks:{
                        color:"white",
                        precision:0
                    },
                    title:{
                        display:true,
                        text:
                        "Anzahl",


                        color:"white"


                    },



                    grid:{


                        color:
                        "rgba(255,255,255,0.1)"


                    }


                }


            }


        }

    });

}




// ===============================
// Bewertungsbalken
// ===============================

function setBar(
    valueId,
    markerId,
    value
){


    const safeValue =
        value ?? 3;



    const percent =
        ((safeValue - 1) / 4) * 100;



    document
    .getElementById(valueId)
    .innerText =
    safeValue.toFixed(1);



    document
    .getElementById(markerId)
    .style.left =
    percent + "%";

}



// ===============================
// Diagramm öffnen/schließen
// ===============================

function toggleChart(id){


    document
    .getElementById(id)
    .classList
    .toggle("open");



    setTimeout(
        () =>
        window.dispatchEvent(
            new Event("resize")
        ),
        150
    );

}
    
</script>

</body>
</html>
