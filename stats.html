






<!DOCTYPE html>
<html>

<head>
    <title>Dixi Stats</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-bottom: 3vh;
            font-size: clamp(22px, 4vw, 34px);
        }

        .stat {
            margin: 6vh auto;
            max-width: 600px;
            width: 90%;
        }

        .label {
            font-size: clamp(16px, 2.2vw, 20px);
            font-weight: bold;
            margin-bottom: 1rem;
        }

        /* Wertanzeige */
        .valueRow {
            margin-bottom: 0.6rem;
        }

        .value {
            font-size: clamp(14px, 2vw, 18px);
            padding: 0.25em 0.7em;
            border: 1px solid white;
            border-radius: 6px;
            display: inline-block;
        }

        /* Balken */
        .bar {
            position: relative;
            height: 1.2rem;
            border-radius: 999px;
            background: linear-gradient(to right, red, orange, yellow, green);
        }

        /* Marker im Balken */
        .barMarker {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 0.8rem;
            transform: translateX(-50%);
            border: 2px solid black;
            border-radius: 4px;
            background: transparent;
        }

        .scale {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-top: 0.4rem;
            opacity: 0.7;
        }
        .chartContainer {
            display: none;
            margin-top: 20px;
        }

        .chartContainer.open {
            display: block;
        }

        .label {
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>Dixi Bewertungen</h1>

    <!-- Hygiene -->
    <div class="stat">
        <div class="label" onclick="toggleChart('hygieneChart')">
        Hygiene
    </div>

    <div class="chartContainer" id="hygieneChart">
        <canvas id="canvasHygiene"></canvas>
    </div>

        <div class="valueRow">
            <span class="value" id="valHygiene">0.0</span>
        </div>

        <div class="bar">
            <div class="barMarker" id="barMarkerHygiene"></div>
        </div>

        <div class="scale">
            <span>1</span>
            <span>5</span>
        </div>
    </div>

    <!-- Geruch -->
    <div class="stat">
        <div class="label">Geruch</div>

        <div class="valueRow">
            <span class="value" id="valGeruch">0.0</span>
        </div>

        <div class="bar">
            <div class="barMarker" id="barMarkerGeruch"></div>
        </div>

        <div class="scale">
            <span>1</span>
            <span>5</span>
        </div>
    </div>

    <!-- Ausstattung -->
    <div class="stat">
        <div class="label">Ausstattung</div>

        <div class="valueRow">
            <span class="value" id="valAusstattung">0.0</span>
        </div>

        <div class="bar">
            <div class="barMarker" id="barMarkerAusstattung"></div>
        </div>

        <div class="scale">
            <span>1</span>
            <span>5</span>
        </div>
    </div>

<script>
        const supabaseUrl = "https://jagyzxwkkxkkuqvmokwq.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImphZ3l6eHdra3hra3Vxdm1va3dxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNjE4MjIsImV4cCI6MjA5NzYzNzgyMn0.A1ImPgv9Cif4tTu8IxhNpdn3xN7lQW1fbh0_gPAN9lY";


    const { createClient } = supabase;
    const client = createClient(supabaseUrl, supabaseKey);

    loadStats();

    async function loadStats() {
        const { data, error } = await client
            .from("rating_stats")
            .select("*")
            .single();

        console.log(data, error);

        if (error || !data) return;

        setBar("valHygiene", "barMarkerHygiene", data.hygiene_avg);
        setBar("valGeruch", "barMarkerGeruch", data.geruch_avg);
        setBar("valAusstattung", "barMarkerAusstattung", data.ausstattung_avg);
    }

    function setBar(valueId, barMarkerId, value) {
        const safeValue = value ?? 3;

        // 1–5 → 0–100%
        const percent = ((safeValue - 1) / 4) * 100;

        document.getElementById(valueId).textContent = safeValue.toFixed(1);
        document.getElementById(barMarkerId).style.left = percent + "%";
    }
    function toggleChart(id) {
        document.getElementById(id).classList.toggle("open");
        }
</script>

</body>
</html>
